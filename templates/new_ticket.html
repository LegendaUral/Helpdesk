{% extends 'base.html' %}
{% block title %}Создать заявку{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-12 col-md-8 col-lg-6">
    <div class="d-flex align-items-center mb-3">
      <a href="{{ url_for('index') }}" class="btn btn-outline-secondary btn-sm me-3">
        <i class="bi bi-arrow-left"></i>
      </a>
      <h5 class="mb-0 fw-bold"><i class="bi bi-plus-circle text-primary me-2"></i>Новая заявка</h5>
    </div>

    <div class="card">
      <div class="card-body p-4">
        <form method="POST" novalidate>

          <div class="mb-3">
            <label class="form-label fw-semibold">Тема <span class="text-danger">*</span></label>
            <input type="text" name="title" class="form-control" maxlength="200"
                   placeholder="Кратко опишите проблему" required autofocus>
            <div class="form-text">Не более 200 символов</div>
          </div>

          <div class="mb-3">
            <label class="form-label fw-semibold">Описание проблемы <span class="text-danger">*</span></label>
            <textarea name="description" class="form-control" rows="5"
                      placeholder="Подробно опишите: что произошло, когда, на каком устройстве..."
                      required></textarea>
          </div>

          <div class="mb-4">
            <label class="form-label fw-semibold">Приоритет</label>
            <select name="priority" class="form-select">
              {% for key, label in priority_labels.items() %}
              <option value="{{ key }}" {% if key == 'medium' %}selected{% endif %}>{{ label }}</option>
              {% endfor %}
            </select>
          </div>

          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary flex-fill">
              <i class="bi bi-send me-1"></i>Отправить заявку
            </button>
            <a href="{{ url_for('index') }}" class="btn btn-outline-secondary flex-fill">
              Отмена
            </a>
          </div>

        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
