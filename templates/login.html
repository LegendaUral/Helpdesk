{% extends 'base.html' %}
{% block title %}Вход{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-12 col-sm-8 col-md-5 col-lg-4">
    <div class="card mt-5">
      <div class="card-body p-4">
        <div class="text-center mb-4">
          <i class="bi bi-headset display-4 text-primary"></i>
          <h4 class="mt-2 fw-bold">HelpDesk</h4>
          <p class="text-muted small">Служба технической поддержки</p>
        </div>
        <form method="POST">
          <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" name="email" class="form-control" placeholder="user@company.ru"
                   required autofocus autocomplete="email">
          </div>
          <div class="mb-4">
            <label class="form-label">Пароль</label>
            <input type="password" name="password" class="form-control"
                   required autocomplete="current-password">
          </div>
          <div class="d-grid">
            <button type="submit" class="btn btn-primary btn-lg">
              <i class="bi bi-box-arrow-in-right me-1"></i>Войти
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
