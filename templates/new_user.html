{% extends 'base.html' %}
{% block title %}Новый пользователь{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-12 col-md-6 col-lg-5">
    <div class="d-flex align-items-center mb-3">
      <a href="{{ url_for('users_list') }}" class="btn btn-outline-secondary btn-sm me-3">
        <i class="bi bi-arrow-left"></i>
      </a>
      <h5 class="mb-0 fw-bold"><i class="bi bi-person-plus text-primary me-2"></i>Новый пользователь</h5>
    </div>

    <div class="card">
      <div class="card-body p-4">
        <form method="POST">
          <div class="mb-3">
            <label class="form-label fw-semibold">Полное имя <span class="text-danger">*</span></label>
            <input type="text" name="name" class="form-control" placeholder="Иванов Иван Иванович"
                   required autofocus>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Email <span class="text-danger">*</span></label>
            <input type="email" name="email" class="form-control" placeholder="user@company.ru" required>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Пароль <span class="text-danger">*</span></label>
            <input type="password" name="password" class="form-control"
                   placeholder="Минимум 6 символов" minlength="6" required>
          </div>
          <div class="mb-4">
            <label class="form-label fw-semibold">Роль</label>
            <select name="role" class="form-select">
              <option value="user">Сотрудник</option>
              <option value="support">Специалист поддержки</option>
              <option value="admin">Администратор</option>
            </select>
          </div>
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary flex-fill">
              <i class="bi bi-check-lg me-1"></i>Создать
            </button>
            <a href="{{ url_for('users_list') }}" class="btn btn-outline-secondary flex-fill">Отмена</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
