{% extends 'base.html' %}
{% block title %}Редактирование пользователя{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-12 col-md-6 col-lg-5">
    <div class="d-flex align-items-center mb-3">
      <a href="{{ url_for('users_list') }}" class="btn btn-outline-secondary btn-sm me-3">
        <i class="bi bi-arrow-left"></i>
      </a>
      <h5 class="mb-0 fw-bold"><i class="bi bi-pencil-square text-primary me-2"></i>Редактирование пользователя</h5>
    </div>

    <div class="card">
      <div class="card-body p-4">
        <form method="POST">
          <div class="mb-3">
            <label class="form-label fw-semibold">Полное имя <span class="text-danger">*</span></label>
            <input type="text" name="name" class="form-control" placeholder="Иванов Иван Иванович"
                   value="{{ user.name }}" required autofocus>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Email <span class="text-danger">*</span></label>
            <input type="email" name="email" class="form-control" placeholder="user@company.ru"
                   value="{{ user.email }}" required>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Новый пароль <span class="text-muted small">(оставьте пустым чтобы не менять)</span></label>
            <input type="password" name="password" class="form-control"
                   placeholder="Минимум 6 символов (опционально)">
          </div>
          <div class="mb-4">
            <label class="form-label fw-semibold">Роль</label>
            <select name="role" class="form-select">
              <option value="user" {% if user.role == 'user' %}selected{% endif %}>Сотрудник</option>
              <option value="support" {% if user.role == 'support' %}selected{% endif %}>Специалист поддержки</option>
              <option value="admin" {% if user.role == 'admin' %}selected{% endif %}>Администратор</option>
            </select>
          </div>
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary flex-fill">
              <i class="bi bi-check-lg me-1"></i>Сохранить
            </button>
            <a href="{{ url_for('users_list') }}" class="btn btn-outline-secondary flex-fill">Отмена</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
